name: verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verification suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy matplotlib pytest

      - name: Run the test suite
        working-directory: code
        run: python -m pytest tests -q

      - name: Run the verification driver
        working-directory: code
        run: python verify_all.py --markdown ../results/verification_report.md

      - name: Regenerate figures
        working-directory: code
        run: python figures/make_figures.py

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verification-output
          path: |
            results/verification_report.md
            paper/figures/

  paper:
    name: Build the manuscript
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Download regenerated figures
        uses: actions/download-artifact@v4
        with:
          name: verification-output
          path: .

      - name: Compile with LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: paper

      - name: Upload the PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/main.pdf
